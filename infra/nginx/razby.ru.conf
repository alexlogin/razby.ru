# Конфиг системного nginx для razby.ru → новая платформа Razby (Docker на 127.0.0.1).
# Устанавливается скриптом scripts/deploy.sh в /etc/nginx/sites-available/razby.ru.
# Использует существующий сертификат Let's Encrypt. Другие сайты сервера не затрагиваются.

server {
    listen 80;
    server_name razby.ru www.razby.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name razby.ru www.razby.ru;

    ssl_certificate /etc/letsencrypt/live/razby.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/razby.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 30m;

    # API NestJS
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Загруженные файлы (mock-хранилище отдаёт api по /files)
    location /files/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
    }

    # Health
    location = /health {
        proxy_pass http://127.0.0.1:4000;
    }
    location /health/ {
        proxy_pass http://127.0.0.1:4000;
    }

    # WebSocket (socket.io)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Frontend Next.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
