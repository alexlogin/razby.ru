name: razby-prod

# Производственный стек razby.ru (приложение Razby) с автоматическим HTTPS
# (Caddy + Let's Encrypt). Наружу открыт только Caddy (80/443).
# Приложение Razby (Next.js) само обслуживает и UI, и /api/*.

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: razby-web:latest
    restart: always
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXTAUTH_URL: https://${DOMAIN}
    volumes:
      - appdata:/app/prisma
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  worker:
    image: razby-web:latest
    restart: always
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      RAZBY_WORKER_ID: ${RAZBY_WORKER_ID:-vps-worker-01}
    command: ['sh', '-c', 'npm run db:init && npm run worker:watch']
    volumes:
      - appdata:/app/prisma
    depends_on:
      web:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      - web
    environment:
      DOMAIN: ${DOMAIN:?нужен DOMAIN, напр. razby.ru}
      ACME_EMAIL: ${ACME_EMAIL:?нужен ACME_EMAIL для Let's Encrypt}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  appdata:
  caddy_data:
  caddy_config:
