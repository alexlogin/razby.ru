name: razby

# Производственный стек razby.ru (приложение Razby).
# На VPS внешний общий обратный прокси (front proxy) держит 80/443, терминирует HTTPS
# для razby.ru и проксирует на 127.0.0.1:13001 — поэтому здесь СВОЙ Caddy НЕ поднимаем,
# а публикуем приложение строго на 127.0.0.1:${RAZBY_HOST_PORT:-13001} (как делал старый сайт).
# Проект называется razby — тот же, что у прежнего сайта, поэтому up --remove-orphans
# заменяет старые контейнеры (web/api/postgres/redis) новыми web+worker, не трогая
# front proxy и другие сайты на VPS.

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: razby-web:latest
    restart: always
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXTAUTH_URL: https://${DOMAIN}
    ports:
      - '127.0.0.1:${RAZBY_HOST_PORT:-13001}:3000'
    volumes:
      - appdata:/app/prisma
    healthcheck:
      test: ['CMD-SHELL', "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  worker:
    image: razby-web:latest
    restart: always
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      RAZBY_WORKER_ID: ${RAZBY_WORKER_ID:-vps-worker-01}
    command: ['sh', '-c', 'npm run db:init && npm run worker:watch']
    volumes:
      - appdata:/app/prisma
    depends_on:
      web:
        condition: service_started

volumes:
  appdata:
