name: razby

# Razby.ru ЗА существующим системным nginx (сервер 89.111.131.180, где уже работают
# другие сайты и приложение bankrot). Никакого Caddy и портов 80/443 — фронтенд и API
# публикуются только на 127.0.0.1, а системный nginx проксирует на них домен razby.ru.
# Порты подобраны так, чтобы не конфликтовать с bankrot (3000, 8000).

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-razby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?нужен POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-razby}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-razby}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-razby}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-razby}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?нужен JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?нужен JWT_REFRESH_SECRET}
      CORS_ORIGINS: https://${DOMAIN:-razby.ru}
      STORAGE_PUBLIC_URL: https://${DOMAIN:-razby.ru}/files
      STORAGE_DRIVER: ${STORAGE_DRIVER:-mock}
      SMS_DRIVER: ${SMS_DRIVER:-mock}
      EMAIL_DRIVER: ${EMAIL_DRIVER:-mock}
      PAYMENTS_DRIVER: ${PAYMENTS_DRIVER:-mock}
    volumes:
      - storage:/app/apps/api/storage
    ports:
      - '127.0.0.1:4000:4000'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-razby.ru}/api
      NEXT_PUBLIC_WS_URL: https://${DOMAIN:-razby.ru}
    ports:
      - '127.0.0.1:13001:3000'

volumes:
  pgdata:
  redisdata:
  storage:
